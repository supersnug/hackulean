<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HacKulean - A Vibe Coded Hacking Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(
          135deg,
          #0a0e27 0%,
          #1a1a3a 50%,
          #0a0e27 100%
        );
        color: #ffffff;
        font-family: "Courier New", monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Animated background grid */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(
            0deg,
            transparent 24%,
            rgba(0, 255, 100, 0.05) 25%,
            rgba(0, 255, 100, 0.05) 26%,
            transparent 27%,
            transparent 74%,
            rgba(0, 255, 100, 0.05) 75%,
            rgba(0, 255, 100, 0.05) 76%,
            transparent 77%,
            transparent
          ),
          linear-gradient(
            90deg,
            transparent 24%,
            rgba(0, 255, 100, 0.05) 25%,
            rgba(0, 255, 100, 0.05) 26%,
            transparent 27%,
            transparent 74%,
            rgba(0, 255, 100, 0.05) 75%,
            rgba(0, 255, 100, 0.05) 76%,
            transparent 77%,
            transparent
          );
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 20px;
        max-width: 800px;
      }

      .title {
        font-size: 4rem;
        font-weight: bold;
        margin-bottom: 10px;
        text-shadow: 0 0 20px rgba(0, 255, 100, 0.8);
        letter-spacing: 4px;
        animation: glow 2s ease-in-out infinite;
      }

      @keyframes glow {
        0%,
        100% {
          text-shadow:
            0 0 20px rgba(0, 255, 100, 0.8),
            0 0 30px rgba(0, 100, 255, 0.4);
        }
        50% {
          text-shadow:
            0 0 30px rgba(0, 255, 100, 0.9),
            0 0 40px rgba(0, 100, 255, 0.6);
        }
      }

      .subtitle {
        font-size: 1.5rem;
        line-height: 1.6;
        margin-bottom: 40px;
        color: #cccccc;
      }

      .rainbow-text {
        background: linear-gradient(
          90deg,
          #ff0000,
          #ff7700,
          #ffff00,
          #00ff00,
          #0000ff,
          #4400ff,
          #ff00ff
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: bold;
        font-style: italic;
        letter-spacing: 2px;
        animation: rainbow-shift 3s linear infinite;
      }

      @keyframes rainbow-shift {
        0% {
          filter: hue-rotate(0deg);
        }
        100% {
          filter: hue-rotate(360deg);
        }
      }

      .cta-button {
        display: inline-block;
        margin-top: 50px;
        padding: 18px 50px;
        background: linear-gradient(90deg, #00ff00, #00aa00);
        color: #000000;
        border: 2px solid #00ff00;
        font-size: 1.3rem;
        font-weight: bold;
        font-family: "Courier New", monospace;
        letter-spacing: 2px;
        cursor: pointer;
        text-decoration: none;
        border-radius: 5px;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        text-transform: uppercase;
      }

      .cta-button:hover {
        background: linear-gradient(90deg, #00aa00, #007700);
        box-shadow: 0 0 40px rgba(0, 255, 0, 0.9);
        transform: scale(1.05);
      }

      .cta-button:active {
        transform: scale(0.98);
      }

      .footer {
        margin-top: 60px;
        font-size: 0.9rem;
        color: #666666;
      }

      .glow-box {
        border: 2px solid #00ff00;
        padding: 30px;
        margin-top: 40px;
        background: rgba(0, 255, 0, 0.05);
        border-radius: 5px;
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">⚠️ HACKULEAN ⚠️</h1>

      <p class="subtitle">
        A <span class="rainbow-text">vibe coded</span> hacking game
      </p>

      <div class="glow-box">
        <p style="font-size: 1.1rem; color: #00ff00; margin-bottom: 20px">
          Enter the digital underground. Outsmart hackers. Defend the network.
        </p>
        <a href="/play" class="cta-button">▶ PLAY NOW</a>
      </div>

      <div class="footer">
        <p>coded by supersnug 🖥️</p>
      </div>
    </div>
  </body>
</html>
