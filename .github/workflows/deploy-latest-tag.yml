name: Deploy Latest Tag to Branch

on:
  push:
    tags:
      - "*" # Trigger workflow on any tag push

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the specific tag that triggered the workflow
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }} # Checks out the pushed tag

      # Optional: Build step for static site generators (Jekyll, Hugo, React, etc.)
      # - name: Build Project
      #   run: |
      #     npm install
      #     npm run build
      #   # Ensure publish_dir corresponds to your build output

      # Configure Git credentials for pushing
      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      # Checkout the gh-pages branch to prepare for pushing
      - name: Checkout gh-pages branch
        run: |
          git fetch origin gh-pages
          git checkout gh-pages

      # Copy the built/source files to the gh-pages branch
      - name: Prepare files for gh-pages branch
        run: |
          # Copy your build output to the root of the gh-pages branch
          # Adjust paths as needed for your project
          cp -r /* ./ || true
          git add .
          git commit -m "Deploy from tag ${{ github.ref_name }}" || echo "No changes to commit"

      # Push to gh-pages branch
      - name: Push to gh-pages branch
        run: |
          git push origin gh-pages
